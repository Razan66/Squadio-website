<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squadio Support</title>

<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        background: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .card {
        background: white;
        padding: 50px;
        border-radius: 24px;
        text-align: center;
        max-width: 500px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .emoji {
        font-size: 60px;
        margin-bottom: 15px;
    }

    h1 {
        margin: 0;
        color: #1a1a1a;
        font-size: 36px;
    }

    p {
        color: #666;
        line-height: 1.7;
        margin-top: 15px;
    }

    .contact {
        margin-top: 30px;
        background: #CDFF00;
        color: #000;
        padding: 15px;
        border-radius: 14px;
        font-weight: 600;
    }

    .footer {
        margin-top: 25px;
        font-size: 14px;
        color: #888;
    }
</style>
</head>

<body>

<div class="card">

    <div class="emoji">🎾</div>

    <h1>Squadio Support</h1>

    <p>
        Welcome to Squadio Support.
        If you need help, have questions, or would like to report an issue,
        please contact us using the information below.
    </p>

    <div class="contact">
        📧 squadio.app@gmail.com<br><br>
        📱 +966 54 502 3164
    </div>

    <div class="footer">
        © 2026 Squadio Sports
    </div>

</div>

</body>
</html>
