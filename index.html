<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squadio Support</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    background: #f5f5f5;
}

.container {
    display: flex;
    justify-content: center;
    padding-top: 100px;
}

.card {
    background: white;
    padding: 50px;
    border-radius: 24px;
    text-align: center;
    max-width: 520px;
    width: 90%;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.emoji {
    font-size: 60px;
    margin-bottom: 15px;
}

h1 {
    margin: 0;
    color: #111;
    font-size: 36px;
}

.description {
    margin-top: 18px;
    color: #666;
    line-height: 1.8;
}

.contact {
    margin-top: 30px;
    background: #CDFF00;
    color: #000;
    padding: 18px;
    border-radius: 14px;
    font-weight: 600;
    line-height: 2;
}

.footer {
    margin-top: 25px;
    color: #888;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
    <div class="card">

        <div class="emoji">🎾</div>

        <h1>Squadio Support</h1>

        <div class="description">
            Need help, have a question, or want to report an issue?<br>
            Contact the Squadio team using the information below.
        </div>

        <div class="contact">
            📧 squadio440@gmail.com<br>
            📱 +966 54 502 3164
        </div>

        <div class="footer">
            © 2026 Squadio Sports
        </div>

    </div>
</div>

</body>
</html>
